server:
  port: 8080
  forward-headers-strategy: native

spring:
  application:
    name: string-api

  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration
      - org.springframework.boot.autoconfigure.orm.jpa.HibernateJpaAutoConfiguration

  profiles:
    default: dev

  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: https://auth.stringtecnologiadf.org/realms/stringtecnologia/protocol/openid-connect/certs

logging:
  level:
    root: INFO