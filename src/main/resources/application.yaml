server:
  port: 8080
  forward-headers-strategy: native

spring:
  application:
    name: string-api
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration
      - org.springframework.boot.autoconfigure.orm.jpa.HibernateJpaAutoConfiguration  

  datasource:
    url: jdbc:postgresql://10.10.10.2:5432/string_api_db
    username: string_api_user
    password: 23038614Ss@abcdze
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: none   # ou validate / update (depende do seu cenário)
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
    show-sql: true

  profiles:
    default: dev   # ✅ PROFILE PADRÃO

  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: https://auth.stringtecnologiadf.org/realms/stringtecnologia/protocol/openid-connect/certs

logging:
  level:
    root: INFO