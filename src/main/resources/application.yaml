server:
  port: 8080
  forward-headers-strategy: native

spring:
  application:
    name: string-api
     

  datasource:
    url: jdbc:postgresql://${NAME_SERVER}:${PORT}/string_api
    username: ${USUARIO}
    password: ${SENHA}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: none   # ou validate / update (depende do seu cenário)
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
    show-sql: true

  profiles:
    default: dev

  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: https://auth.stringtecnologiadf.org/realms/stringtecnologia/protocol/openid-connect/certs

logging:
  level:
    root: INFO

api:
  infosimples:
    api-base-url: ${URL}
    api-key: ${KEY}
    time-out: 30s