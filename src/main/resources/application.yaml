server:
  port: 8080
  forward-headers-strategy: native

spring:
  application:
    name: string-api

  profiles:
    default: dev   # ✅ PROFILE PADRÃO

  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: https://auth.stringtecnologiadf.org/realms/stringtecnologia/protocol/openid-connect/certs

logging:
  level:
    root: INFO